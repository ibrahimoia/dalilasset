
<!DOCTYPE html>
<html>
<head>
    <title>Asset Viewer</title>
</head>
<body>

<h2>Upload Data</h2>

<form method="POST" enctype="multipart/form-data">
    <label>Upload Excel:</label><br>
    <input type="file" name="excel_file"><br><br>

    <label>Photos Folder Path:</label><br>
    <input type="text" name="photos_folder" 
           placeholder="e.g. C:\Users\Omar\Pictures\assets"
           style="width:400px;">
    <br><br>

    <button type="submit">Submit</button>
</form>

<hr>

<h2>Search Asset</h2>

<form method="GET">
    <input type="text" name="barcode" placeholder="Enter Barcode">
    <button type="submit">Search</button>
</form>

<hr>

{% if selected_asset %}
    <h3>Asset Details</h3>

    <p><b>Barcode:</b> {{ selected_asset.AssetBarcode }}</p>
    <p><b>Description:</b> {{ selected_asset.AssetDescription }}</p>
    <p><b>PIN:</b> {{ selected_asset.PIN }}</p>

    {% if photo_url %}
        <h4>Photo:</h4>
        <img src="{{ photo_url }}" width="300">
    {% else %}
        <p>No photo found</p>
    {% endif %}
{% endif %}

</body>
</html>
